name: repo visualization

on:
    push:
    workflow_dispatch:

jobs:
    diagram:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3

            - name: Update diagram
              id: make_diagram
              uses: githubocto/repo-visualizer@0.7.1
              with:
                output_file: "output-diagram.svg"
                artifact_name: "diagram"
                should_push: false

            - name: Upload als artifact
              uses: actions/upload-artifact@v4
              with:
                name: diagram             # exact deze naam gevraagd
                path: diagram.svg